name: Verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
      - run: npm run check

  required:
    name: Verify
    if: ${{ always() }}
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Check every supported system
        env:
          CHECK_RESULT: ${{ needs.check.result }}
        run: test "${CHECK_RESULT}" = "success"
