name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm run check
      - name: Package plugin
        run: |
          zip -r "hope-${GITHUB_REF_NAME}.zip" plugins/hope
          sha256sum "hope-${GITHUB_REF_NAME}.zip" > "hope-${GITHUB_REF_NAME}.zip.sha256"
      - name: Create prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          "hope-${GITHUB_REF_NAME}.zip"
          "hope-${GITHUB_REF_NAME}.zip.sha256"
          --title "Hope ${GITHUB_REF_NAME}"
          --notes-file CHANGELOG.md
          --prerelease
