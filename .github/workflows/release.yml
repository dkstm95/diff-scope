name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm run check
      - name: Build plugin
        run: |
          npm run build:plugin
          git diff --exit-code -- plugins/hope
      - name: Package plugin
        working-directory: plugins/hope
        run: zip -r "../../hope-${GITHUB_REF_NAME}.zip" .
      - name: Check package root
        run: |
          unzip -p "hope-${GITHUB_REF_NAME}.zip" .claude-plugin/plugin.json > /dev/null
          unzip -p "hope-${GITHUB_REF_NAME}.zip" .codex-plugin/plugin.json > /dev/null
          unzip -p "hope-${GITHUB_REF_NAME}.zip" skills/diff/SKILL.md > /dev/null
          sha256sum "hope-${GITHUB_REF_NAME}.zip" > "hope-${GITHUB_REF_NAME}.zip.sha256"
      - name: Create prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          "hope-${GITHUB_REF_NAME}.zip"
          "hope-${GITHUB_REF_NAME}.zip.sha256"
          --title "Hope ${GITHUB_REF_NAME}"
          --generate-notes
          --prerelease
