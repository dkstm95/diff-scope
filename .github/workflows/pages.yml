name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - run: npm run check
      - uses: actions/configure-pages@v6
      - name: Build static site
        run: node tools/build-site.mjs --output "$RUNNER_TEMP/diffscope-pages"
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ runner.temp }}/diffscope-pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
